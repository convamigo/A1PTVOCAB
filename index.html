<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treinador de Vocabulário (NL → PT-BR)</title>
  <style>
    /* Show slider on hover */
    #volume-control:hover #volume-slider { display: block !important; }
    :root {
      --primary: #e0f7fa;
      --secondary: #b2ebf2;
      --correct-bg: #dcedc8;
      --incorrect-bg: #ffcdd2;
      --light-gray: #f5f5f5;
      --dk-button: #cccccc88;
      --type-correct: #4caf50;
      --type-incorrect: #f44336;
      --type-dk: #9e9e9e;
      --screen-bg: #ffffffcc;
      --btn-primary: #4caf50;
      --btn-secondary: #2196f3;
    }
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background: #fafafa; }
    .screen {
        display: none;
        width: 100%;
        max-width: 400px;
        margin-top: 50px;
        text-align: center;
        background: var(--screen-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    .screen.active { display: block; }
    .count-box {
        background: var(--secondary);
        padding: 10px 15px;
        border-radius: 8px;
        font-weight: bold;
        display: inline-block;
        margin: 10px 0;
    }
    .pt-box {
        background: white;
        padding: 10px;
        border-radius: 5px;
    }
    .same-size-btn {
        height: 100%;
        width: 45%;
    }
    .container {
        align-items: center;
        width: 100%;
        padding: 5px;
        display: flex;
        flex-direction: column;
    }

    button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; transition: transform 0.2s ease; }
    #start-btn, #retry-btn, #restart-btn {
        background: #1679ab;
        width: 30%;
        color: white;
    }
    #start-btn:hover, #retry-btn:hover, #restart-btn:hover {
        background: #1C99D8;
    }
    button:hover { transform: scale(1.05); }
    #term-box { background: var(--primary); padding: 20px; border-radius: 8px; font-size: 1.5em; margin-bottom: 20px; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .option { background: white; padding: 15px; border-radius: 5px; position: relative; cursor: pointer; border: 1px solid #eeeeee; transition: box-shadow 0.2s ease, border-color 0.2s ease; }
    /* Matching‐pairs mode */
    .match-item {
  flex: 1;
  padding: 15px;
  margin: 5px;
  border: 2px solid #ccc;
  border-radius: 5px;
  cursor: pointer;
  user-select: none;
}
    .match-item.selected { background: var(--secondary); }
    .match-item.correct  { background: var(--correct-bg); border-color: var(--type-correct); }
    .match-item.incorrect{ background: var(--incorrect-bg); border-color: var(--type-incorrect); }
    .match-columns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

#match-container {
  display: flex;
  flex-direction: row;
  gap: 10px;
}
    .option .key { position: absolute; top: 50%; transform: translateY(-50%); left: 8px; width: 20px; height: 20px; border-radius: 50%; background: var(--secondary); color: #333; display: flex; align-items: center; justify-content: center; font-size: 0.8em; }
    .progress { width: 100%; background: #ddd; border-radius: 5px; height: 20px; overflow: hidden; position: relative; margin-bottom: 20px; }
    .progress .mcq, .progress .type { position: absolute; top: 0; height: 100%; transition: width 0.3s ease, left 0.3s ease, background-color 0.3s ease; }
    .progress .mcq { left: 0; background: #1679ab; }
    .progress .type { background-color: var(--type-correct); }
    #typing-area { display: none; margin-top: 10px; }
    #typing-area.active { display: flex; align-items: center; gap: 5px; }
    #typing-input { flex: 1; padding: 10px; font-size: 1em; }
    #enter-btn { background: transparent; font-size: 1.2em; margin-left: 5px; padding: 0 10px; }
    #dk-btn { background: var(--dk-button); color: #333; font-size: 0.9em; margin-top: 10px; display: none; }
    .error-item { display: flex; justify-content: space-between; background: var(--light-gray); padding: 10px; margin: 5px 0; border-radius: 5px; align-items: center; }
    .correct-text { background: var(--correct-bg); padding: 10px; border-radius: 5px; }
    @media (max-width: 700px) {
        .options {
            display: grid;
            grid-template-columns: 1fr;
  }

}
  #start-btn, #retry-btn, #restart-btn, .same-size-btn {
    width: 100%;
  }

  .screen {
    margin-top: 20px;
    padding: 20px;
    max-width: min(500px, 90vw);
  }

  .progress {
    height: 16px;
  }
  
  @media (min-width: 1024px) {
  .screen {
    max-width: 700px;
    padding: 40px;
  }

  .option {
    font-size: 1.2em;
    padding: 20px;
  }

  #term-box {
    font-size: 2em;
    padding: 30px;
  }

  .count-box, .pt-box, .correct-text {
    font-size: 1.1em;
    padding: 12px 18px;
  }

  button {
    font-size: 1em;
    padding: 12px 24px;
  }

  #typing-input {
    font-size: 1.2em;
    padding: 12px;
  }
}
  </style>
</head>
<body>
    <div class="container">
  <div id="start-screen" class="screen active">
    <h1>Treinador de Vocabulário</h1>
    <p id="intro-text"></p>
    <div class="count-box">
        <span id="total-count">0</span> palavras
        </div>
        <p></p>


    <button id="start-btn">Começar</button>
  </div>

  <div id="quiz-screen" class="screen">
    <div class="progress">
      <div id="mcq-bar" class="mcq"></div>
      <div id="type-bar" class="type"></div>
    </div>
    <div id="term-box"></div>
    <div id="mcq-options" class="options"></div>
    <div id="typing-area">
      <input id="typing-input" type="text" placeholder="Digite a tradução em português..." autofocus>
      <button id="enter-btn">↵</button>
    </div>
    <button id="dk-btn">Não sei</button>
  </div>
  
  <!-- MATCH SCREEN -->
  <div id="match-screen" class="screen">
    <h2>Combine as palavras</h2>
    <div id="match-container" class="options"></div>
    <button id="match-done-btn" style="display:none; margin-top:10px;">Concluir</button>
  </div>

  <div id="end-screen" class="screen">
    <h2>Revisar erros</h2>
    <div id="end-list"></div>
    <button id="retry-btn" class="same-size-btn">Repetir erros</button>
    <button id="restart-btn" class="same-size-btn">Recomeçar tudo</button>
  </div>

  <audio id="sound-correct" src="https://github.com/convamigo/InglesA1/raw/refs/heads/main/Correct2.mp3"></audio>
  <audio id="sound-wrong" src="https://github.com/convamigo/InglesA1/raw/refs/heads/main/Incorrect2.mp3"></audio>
 <div id="volume-control" style="margin-top: 20px; display: flex; flex-direction: column; align-items: center;">
     <button id="volume-toggle" style="background: none; border: none; cursor: pointer; padding: 0;">
         <img src="https://www.convamigo.com/wp-content/uploads/2025/07/Untitled-1.png" alt="Volume" style="height: 24px; width: auto;">
         </button>
     <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="1" style="display: none; margin-top: 8px;">
     </div>

  <script>
      // Carrega o arquivo JSON indicado na URL.
      // Suporta:
      // 1) ?list=<url-ou-nome>  (recomendado)
      // 2) #<url-ou-nome>
      // 3) fallback: vocab-nl-pt.json
      //
      // Se você passar apenas um nome (ex.: m1-subjuntivos.json), ele será buscado no BASE_LIST_URL.
      let initialTerms = [];

      const BASE_LIST_URL = 'https://convamigo.github.io/A1PTVOCAB/';
      const DEFAULT_LIST_FILE = 'm1-subjuntivos.json';

      function resolveListPath(raw) {
        // If nothing is specified, load a sensible default that exists in this repo.
        if (!raw) return BASE_LIST_URL + DEFAULT_LIST_FILE;
        const v = decodeURIComponent(String(raw).trim());
        if (!v) return BASE_LIST_URL + DEFAULT_LIST_FILE;

        // allow full URLs
        if (/^https?:\/\//i.test(v)) return v;

        // allow absolute paths
        if (v.startsWith('/')) return v;

        // if user passes "m2-verbos" add .json
        const withExt = v.toLowerCase().endsWith('.json') ? v : `${v}.json`;

        // treat as file in the shared base folder
        return BASE_LIST_URL + withExt;
      }

      const params = new URLSearchParams(window.location.search);
      const rawFromQuery = params.get('list') || params.get('vocab') || params.get('data');
      const rawFromHash = window.location.hash ? window.location.hash.substring(1) : '';
      const requestedListRef = rawFromQuery || rawFromHash || DEFAULT_LIST_FILE;
      const dataFile = resolveListPath(requestedListRef);
      const currentListId = getListIdFromPath(requestedListRef || dataFile);

      // Helpful for debugging on GitHub Pages
      console.log('Loading vocab list:', dataFile);
      console.log('Progress list ID:', currentListId);

      const PROGRESS_STORAGE_KEY = 'convamigo_vocab_progress';

      function termKey(term){
        return `${term.nl}|||${term.pt}`;
      }

      function buildTermMap(list){
        const map = new Map();
        list.forEach(term => map.set(termKey(term), term));
        return map;
      }

      function serializeTermList(list){
        return (list || []).map(term => ({
          key: termKey(term),
          readyAt: term._readyAt ?? null
        }));
      }

      function hydrateTermList(serialized, termMap){
        return (serialized || []).map(item => {
          const term = termMap.get(item.key);
          if (!term) return null;
          term._readyAt = item.readyAt ?? null;
          return term;
        }).filter(Boolean);
      }

      function getListIdFromPath(path){
        const raw = String(path || '').trim();
        if (!raw) return DEFAULT_LIST_FILE;
        const clean = decodeURIComponent(raw).split('#')[0].split('?')[0];
        const parts = clean.split('/').filter(Boolean);
        const last = parts.length ? parts[parts.length - 1] : clean;
        return last.toLowerCase().endsWith('.json') ? last : `${last}.json`;
      }

      function isEmbeddedInIframe(){
        return window.parent && window.parent !== window;
      }

      // --- iframe bridge (GitHub iframe ↔ WordPress parent) ---
      const bridgePending = new Map();
      let bridgeSeq = 0;

      function getBridgeTargetOrigin(){
        try {
          if (document.referrer) return new URL(document.referrer).origin;
        } catch (err) {
          console.warn('Could not determine parent origin from referrer:', err);
        }
        return '*';
      }

      window.addEventListener('message', (event) => {
        const msg = event.data || {};
        if (!msg || !msg.type || !msg.requestId) return;
        const pending = bridgePending.get(msg.requestId);
        if (!pending) return;
        bridgePending.delete(msg.requestId);
        pending.resolve(msg);
      });

      function sendBridgeMessage(type, payload = {}){
        if (!isEmbeddedInIframe()) return Promise.resolve(null);
        return new Promise((resolve) => {
          const requestId = `bridge_${Date.now()}_${++bridgeSeq}`;
          bridgePending.set(requestId, { resolve });
          window.parent.postMessage({ type, requestId, ...payload }, getBridgeTargetOrigin());

          // timeout fallback
          setTimeout(() => {
            if (bridgePending.has(requestId)) {
              bridgePending.delete(requestId);
              resolve(null);
            }
          }, 3000);
        });
      }

      function getProgressMeta(){
        const wp = window.wpVocabProgress || {};
        return {
          enabled: !!(wp.enabled && wp.userId),
          userId: wp.userId || null,
          restUrl: wp.restUrl || null,
          nonce: wp.nonce || null,
          listId: wp.listId || currentListId,
          bridgeEnabled: isEmbeddedInIframe()
        };
      }

      function getLocalProgressKey(){
        const meta = getProgressMeta();
        const userPart = meta.userId ? `user_${meta.userId}` : 'guest';
        return `${PROGRESS_STORAGE_KEY}__${userPart}__${meta.listId}`;
      }

      async function saveProgress() {
        try {
          const meta = getProgressMeta();
          if (!initialTerms.length || !terms) return;
          const payload = {
            savedAt: new Date().toISOString(),
            listId: meta.listId,
            terms: serializeTermList(terms),
            stage1Queue: serializeTermList(stage1Queue),
            learnedStage1: serializeTermList(learnedStage1),
            learnedTyping: serializeTermList(learnedTyping),
            stage2Queue: serializeTermList(stage2Queue),
            mistakes: serializeTermList(mistakes),
            currentTerm: currentTerm ? { key: termKey(currentTerm), readyAt: currentTerm._readyAt ?? null } : null,
            typeCount,
            round,
            activeScreen: document.querySelector('.screen.active')?.id || 'start-screen',
            typingValue: typingInput ? typingInput.value : ''
          };

          localStorage.setItem(getLocalProgressKey(), JSON.stringify(payload));

          if (meta.bridgeEnabled) {
            sendBridgeMessage('VOCAB_SAVE', { payload }).then((reply) => {
              if (reply && reply.success === false) {
                console.warn('Bridge progress save failed');
              }
            });
            return;
          }

          if (meta.enabled && meta.restUrl && meta.nonce) {
            fetch(meta.restUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-WP-Nonce': meta.nonce
              },
              credentials: 'same-origin',
              body: JSON.stringify(payload)
            }).catch(err => console.warn('WP progress save failed:', err));
          }
        } catch (err) {
          console.warn('Could not save progress:', err);
        }
      }

      async function loadProgress() {
        const meta = getProgressMeta();

        if (meta.bridgeEnabled) {
          try {
            const reply = await sendBridgeMessage('VOCAB_LOAD', { listId: meta.listId });
            if (reply && reply.payload && reply.payload.listId) return reply.payload;
          } catch (err) {
            console.warn('Bridge progress load failed:', err);
          }
        }

        if (meta.enabled && meta.restUrl && meta.nonce) {
          try {
            const url = new URL(meta.restUrl, window.location.origin);
            url.searchParams.set('list_id', meta.listId);
            const res = await fetch(url.toString(), {
              method: 'GET',
              headers: { 'X-WP-Nonce': meta.nonce },
              credentials: 'same-origin'
            });
            if (res.ok) {
              const remoteState = await res.json();
              if (remoteState && remoteState.listId) return remoteState;
            }
          } catch (err) {
            console.warn('WP progress load failed:', err);
          }
        }

        try {
          const raw = localStorage.getItem(getLocalProgressKey());
          return raw ? JSON.parse(raw) : null;
        } catch (err) {
          console.warn('Could not read saved progress:', err);
          return null;
        }
      }

      function clearProgress() {
        try {
          localStorage.removeItem(getLocalProgressKey());
        } catch (err) {
          console.warn('Could not clear local progress:', err);
        }

        const meta = getProgressMeta();
        if (meta.bridgeEnabled) {
          sendBridgeMessage('VOCAB_CLEAR', { listId: meta.listId }).then((reply) => {
            if (reply && reply.success === false) {
              console.warn('Bridge progress clear failed');
            }
          });
          return;
        }

        if (meta.enabled && meta.restUrl && meta.nonce) {
          fetch(meta.restUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-WP-Nonce': meta.nonce
            },
            credentials: 'same-origin',
            body: JSON.stringify({ listId: meta.listId, clear: true })
          }).catch(err => console.warn('WP progress clear failed:', err));
        }
      }

      function restoreSession(state) {
        const termMap = buildTermMap(initialTerms);
        terms = hydrateTermList(state.terms, termMap);
        stage1Queue = hydrateTermList(state.stage1Queue, termMap);
        learnedStage1 = hydrateTermList(state.learnedStage1, termMap);
        learnedTyping = hydrateTermList(state.learnedTyping, termMap);
        stage2Queue = hydrateTermList(state.stage2Queue, termMap);
        mistakes = hydrateTermList(state.mistakes, termMap);
        currentTerm = state.currentTerm ? (termMap.get(state.currentTerm.key) || null) : null;
        if (currentTerm && state.currentTerm?.readyAt != null) currentTerm._readyAt = state.currentTerm.readyAt;
        typeCount = state.typeCount || 0;
        round = state.round || 0;
        totalCountEl.textContent = terms.length;
        resetTypeBar();
        updateProgress();

        if (state.activeScreen === 'end-screen') {
          endSession();
          return;
        }

        if (state.activeScreen === 'quiz-screen' && currentTerm) {
          showScreen(quizScreen);
          const isTypingTerm = !learnedTyping.includes(currentTerm) && (stage2Queue.includes(currentTerm) || learnedStage1.includes(currentTerm));
          if (isTypingTerm) {
            renderTyping(currentTerm);
            typingInput.value = state.typingValue || '';
          } else {
            renderMCQ(currentTerm);
          }
          return;
        }

        showScreen(startScreen);
      }

      fetch(dataFile)
      .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status} ao buscar ${dataFile}`);
          return res.json();
      })
      .then(async data => {
          initialTerms = (data.terms || []).map(t => ({
            ...t,
            nl: t.nl ?? t.en ?? t.dutch ?? t.term ?? '',
            pt: t.pt ?? t.ptbr ?? t['pt-BR'] ?? t.br ?? t.translation ?? '',
            example: t.example ?? t.exemplo ?? t.frase ?? ''
          }));
          document.getElementById('intro-text').textContent = data.intro || '';
          const savedState = await loadProgress();
          if (savedState && savedState.listId === getProgressMeta().listId) {
            restoreSession(savedState);
          } else {
            startSession();
            showScreen(startScreen);
          }
      })
      .catch(err => {
          alert('Não foi possível carregar ' + dataFile + ': ' + err);
      });
    let terms, stage1Queue, learnedStage1, learnedTyping, stage2Queue, mistakes, currentTerm, typeCount, round;
    const startScreen=document.getElementById('start-screen'),
          quizScreen=document.getElementById('quiz-screen'),
          matchScreen=document.getElementById('match-screen'),
          endScreen=document.getElementById('end-screen');
    const totalCountEl=document.getElementById('total-count'),
          startBtn=document.getElementById('start-btn'),
          retryBtn=document.getElementById('retry-btn'),
          restartBtn=document.getElementById('restart-btn');
    const termBox=document.getElementById('term-box'),
          mcqOptions=document.getElementById('mcq-options');
    const typingArea=document.getElementById('typing-area'),
          typingInput=document.getElementById('typing-input');
    const enterBtn=document.getElementById('enter-btn'),
          dkBtn=document.getElementById('dk-btn');
    const mcqBar=document.getElementById('mcq-bar'),
          typeBar=document.getElementById('type-bar');
    const soundCorrect=document.getElementByI
